appId: com.airwallex.paymentacceptance
env:
  # Desired state of each checkbox in the "Required Billing Fields" dialog.
  # All five default to "false" (empty set), which the SDK treats as a valid
  # "hide every billing-related row" config.
  HAS_NAME: ${HAS_NAME || "false"}
  HAS_EMAIL: ${HAS_EMAIL || "false"}
  HAS_PHONE: ${HAS_PHONE || "false"}
  HAS_ADDRESS: ${HAS_ADDRESS || "false"}
  HAS_COUNTRY_CODE: ${HAS_COUNTRY_CODE || "false"}

  # Expected visibility on the AddCardSection screen after the config is applied.
  # Use string "true"/"false". We assert on the *section labels* (StandardText
  # composables that always render when the corresponding `showXxx` is true) —
  # not on placeholder text inside TextFields, since the sample app's default
  # shipping prefills values and hides the placeholders.
  EXPECT_NAME_FIELD: ${EXPECT_NAME_FIELD || "false"}
  EXPECT_EMAIL_FIELD: ${EXPECT_EMAIL_FIELD || "false"}
  EXPECT_PHONE_FIELD: ${EXPECT_PHONE_FIELD || "false"}
  EXPECT_BILLING_SECTION: ${EXPECT_BILLING_SECTION || "false"}
  # `Same as shipping address` toggle only renders when `showAddress &&
  # shipping != null`. Use it to distinguish full ADDRESS (true) from
  # COUNTRY_CODE-only (false, but EXPECT_BILLING_SECTION still true).
  EXPECT_FULL_ADDRESS: ${EXPECT_FULL_ADDRESS || "false"}
---
# Precondition: we're on the HPP options screen ("Integrate with Airwallex UI" tile
# has been tapped previously and the screen exposes the "setting" entry + "Launch
# payment list" button).

# ─────────────────────────────────────────────────────────────────────────────
# Step 1 — Configure billing fields via the Settings screen
# ─────────────────────────────────────────────────────────────────────────────
# Delegated to flow_set_required_billing_fields.yaml so other tests (e.g.
# test_hpp_country_billing_fields) can apply a config without paying for the
# per-config visibility assertions below.
- runFlow:
    file: flow_set_required_billing_fields.yaml
    env:
      HAS_NAME: ${HAS_NAME}
      HAS_EMAIL: ${HAS_EMAIL}
      HAS_PHONE: ${HAS_PHONE}
      HAS_ADDRESS: ${HAS_ADDRESS}
      HAS_COUNTRY_CODE: ${HAS_COUNTRY_CODE}

# ─────────────────────────────────────────────────────────────────────────────
# Step 2 — Open the new-card form
# ─────────────────────────────────────────────────────────────────────────────
- tapOn: "Launch payment list"
- runFlow:
    when:
      visible: "Choose a card"
    commands:
      - tapOn: "Add new"
- assertVisible: "Card information"

# ─────────────────────────────────────────────────────────────────────────────
# Step 3 — Assert which billing-related fields render
#
# Strategy:
# • Phase A — negatives FIRST, while still scrolled at the top. Compose strips
#   non-rendered sections from the tree entirely, so `assertNotVisible` is
#   reliable as long as no scroll has shifted other content off-screen.
# • Phase B — positives via `scrollUntilVisible`. Plain `assertVisible` does
#   NOT auto-scroll on this app; the form is taller than the viewport when
#   multiple sections are enabled.
# ─────────────────────────────────────────────────────────────────────────────

# ── Phase A: negative assertions (at top of form, before any scroll) ──
- runFlow:
    when:
      true: ${EXPECT_NAME_FIELD == 'false'}
    commands:
      - assertNotVisible: "Name on card"
- runFlow:
    when:
      true: ${EXPECT_EMAIL_FIELD == 'false'}
    commands:
      - assertNotVisible: "Email"
- runFlow:
    when:
      true: ${EXPECT_PHONE_FIELD == 'false'}
    commands:
      - assertNotVisible: "Phone number"
- runFlow:
    when:
      true: ${EXPECT_BILLING_SECTION == 'false'}
    commands:
      - assertNotVisible: "Billing info"
- runFlow:
    when:
      true: ${EXPECT_FULL_ADDRESS == 'false'}
    commands:
      - assertNotVisible: "Same as shipping address"

# ── Phase B: positive assertions (scroll into view) ──
- runFlow:
    when:
      true: ${EXPECT_NAME_FIELD == 'true'}
    commands:
      - assertVisible: "Name on card"
- runFlow:
    when:
      true: ${EXPECT_EMAIL_FIELD == 'true'}
    commands:
      - scrollUntilVisible:
          element: "Email"
- runFlow:
    when:
      true: ${EXPECT_PHONE_FIELD == 'true'}
    commands:
      - scrollUntilVisible:
          element: "Phone number"
- runFlow:
    when:
      true: ${EXPECT_BILLING_SECTION == 'true'}
    commands:
      - scrollUntilVisible:
          element: "Billing info"
- runFlow:
    when:
      true: ${EXPECT_FULL_ADDRESS == 'true'}
    commands:
      - scrollUntilVisible:
          element: "Same as shipping address"

# ─────────────────────────────────────────────────────────────────────────────
# Step 4 — Navigate back to the HPP options screen for the next cycle
#
# Backing out of AddCardActivity / PaymentMethodsActivity triggers the SDK's
# "Payment cancelled" dialog every time. Each back step must be paired with a
# conditional popup dismissal before the next state check.
# ─────────────────────────────────────────────────────────────────────────────
- back
- runFlow:
    when:
      visible: "Payment cancelled"
    commands:
      - tapOn: "OK"
- runFlow:
    when:
      notVisible: "Launch payment list"
    commands:
      - back
      - runFlow:
          when:
            visible: "Payment cancelled"
          commands:
            - tapOn: "OK"
- assertVisible: "Launch payment list"
