appId: com.airwallex.paymentacceptance
tags:
  - schema
  - embedded
  - guest
platform:
  android:
    disableAnimations: true  # Disables system animations on the Android emulator
---
- runFlow:
    when:
      true: ${IS_RECORDING}
    commands:
      - startRecording: test_embedded_element_accordion_schema
- runScript: ../Common/settings.js
- runFlow:
    file: flow_embedded_element_schema_payment.yaml
    env:
      LAYOUT: ${output.settings.layout.accordion} # Use the accordion layout for this test
- runFlow:
    when:
      true: ${IS_RECORDING}
    commands:
      - stopRecording
