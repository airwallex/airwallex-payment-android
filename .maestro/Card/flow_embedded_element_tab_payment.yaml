appId: com.airwallex.paymentacceptance
---
- launchApp
- tapOn: "Integrate with Airwallex UI"
- runFlow:
    file: ../Common/flow_update_checkout_mode.yaml
    env:
      CHECKOUT_MODE: ${output.settings.checkoutMode.oneOff} # Ensure one-off checkout mode
- tapOn: setting
- runFlow:
    file: ../Common/flow_update_settings.yaml
    env:
      LAYOUT: ${LAYOUT}
      ENVIRONMENT: ${output.settings.environment.demo}
      NEXT_TRIGGERED_BY: ${output.settings.nextTriggeredBy.customer}
      IS_GUEST: false
      USE_NEW_SESSION: false
- tapOn: "Embedded element"
# Wait for the embedded element activity to load
- assertVisible: "Order details"
# Assert Google Pay button exists by checking for the "Or pay with" divider.
# First wait up to 10s for it to render (handles slow Google Pay readiness check),
# only fall back to scrolling if it still isn't on screen.
- extendedWaitUntil:
    visible:
      text: "Or pay with"
    timeout: 10000
    optional: true
- runFlow:
    when:
      notVisible:
        text: "Or pay with"
    commands:
      - scrollUntilVisible:
          element:
            text: "Or pay with"
# Scroll down to the card information section
- scrollUntilVisible:
    element: "Card information"
# Fill in card details
- tapOn:
    id: "card-number-text-field"
- inputText: ${CARD_NUMBER}
- tapOn:
    id: "card-expiry-text-field"
- inputText: "1233"
- tapOn:
    id: "card-cvc-text-field"
- inputText: "333"
# Scroll to billing info section
- scrollUntilVisible:
    element: "Billing info"
# Ensure "Same as shipping address" is checked if needed
- assertVisible: "Same as shipping address"
# Ensure "Save this card for future payments" checkbox is UNCHECKED
- scrollUntilVisible:
    element: "Save this card for future payments"
- assertVisible: "Save this card for future payments"
- runFlow:
    when:
      visible:
        id: "card-saving-toggle-checked"
    commands:
      - tapOn:
          id: "card-saving-toggle-checked"
      - assertVisible:
          id: "card-saving-toggle-unchecked"
# Scroll to the Pay/Confirm button
- scrollUntilVisible:
    element: "^(Pay|Confirm)$"
    centerElement: true # Center so the button isn't cut off at the bottom edge and stays tappable
- tapOn: "^(Pay|Confirm)$"
# Handle payment result
- runFlow:
    file: ../Common/flow_handle_payment_result.yaml
    env:
      PAYMENT_RESULT: SUCCESS # SUCCESS/FAILED/CANCELLED
