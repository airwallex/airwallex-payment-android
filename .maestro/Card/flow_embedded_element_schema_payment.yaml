appId: com.airwallex.paymentacceptance
---
- launchApp
- tapOn: "Integrate with Airwallex UI"
- runFlow:
    file: ../Common/flow_update_checkout_mode.yaml
    env:
      CHECKOUT_MODE: ${output.settings.checkoutMode.oneOff} # Ensure one-off checkout mode
# Ensure layout is Accordion - go to settings and change it
- tapOn: setting
- runFlow:
    file: ../Common/flow_update_settings.yaml
    env:
      LAYOUT: ${LAYOUT}
      ENVIRONMENT: ${output.settings.environment.demo}
      NEXT_TRIGGERED_BY: ${output.settings.nextTriggeredBy.customer}
      IS_GUEST: true
      USE_NEW_SESSION: false
- tapOn: "Launch Embedded Element"
# Wait for the embedded element activity to load
- assertVisible: "Shopping Cart"
# Scroll down to AlipayHK
- scrollUntilVisible:
    element: "AlipayHK"
# Click on AlipayHK
- tapOn: "AlipayHK"
# Click Pay button
- scrollUntilVisible:
    element: "^(Pay|Confirm)$"
- tapOn: "^(Pay|Confirm)$"
# WebView opens - click "Pay Now"
- assertVisible: "Pay Now"
- tapOn: "Pay Now"
# Wait for "Return to Merchant" text with countdown
- assertVisible: "Return to Merchant \\(\\d+\\)"
# Close the webview by tapping the X icon at top-left toolbar
- tapOn:
    point: "10%,5%"
# Wait for payment result popup
- assertVisible: "SUCCEED"
- tapOn: "OK"
