appId: com.airwallex.paymentacceptance
tags:
  - card 
  - user
platform:
  android:
    disableAnimations: true  # Disables system animations on the Android emulator
# env:
#   WITH_PAYMENT: true # Flag to indicate if payment should be made
#   TRIGGER_BY_CUSTOMER: true # Flag to indicate if the flow is triggered by customer
---
- runScript: ../Common/settings.js
- runScript: cards.js
- launchApp
- tapOn: "Integrate with Airwallex UI"
- runFlow:
    when:
      true: ${WITH_PAYMENT}
    file: ../Common/flow_update_checkout_mode.yaml
    env:
      CHECKOUT_MODE: ${output.settings.checkoutMode.recurringAndPayment}
- runFlow:
    when:
      true: ${WITH_PAYMENT == 'false'}
    file: ../Common/flow_update_checkout_mode.yaml
    env:
      CHECKOUT_MODE: ${output.settings.checkoutMode.recurring}
# update settings
- tapOn: setting
- runFlow:
    when:
      true: ${TRIGGER_BY_CUSTOMER}
    file: ../Common/flow_update_settings.yaml
    env:
      LAYOUT: ${output.settings.layout.tab}
      ENVIRONMENT: ${output.settings.environment.preview}
      NEXT_TRIGGERED_BY: ${output.settings.nextTriggeredBy.customer}
      IS_GUEST: false
      USE_NEW_SESSION: false
- runFlow:
    when:
      true: ${TRIGGER_BY_CUSTOMER == 'false'}
    file: ../Common/flow_update_settings.yaml
    env:
      LAYOUT: ${output.settings.layout.tab}
      ENVIRONMENT: ${output.settings.environment.preview}
      NEXT_TRIGGERED_BY: ${output.settings.nextTriggeredBy.merchant}
      IS_GUEST: false
      GENERATE_NEW_CUSTOMER_ID: true
      USE_NEW_SESSION: false 

# start recurring payment flow
- tapOn: "Launch payment list"
- runFlow:
    file: flow_pay_with_card.yaml
    env:
      CARD_NUMBER: ${output.cards.visa} # Card number for testing
      CAN_SAVE_CARD: false 
      SHOULD_SAVE_CARD: false
- runFlow:
    when:
      true: ${TRIGGER_BY_CUSTOMER == 'false'}
    file: ../Common/flow_handle_3ds.yaml
    env:
      CANCEL_3DS: false
- runFlow:
    file: ../Common/flow_handle_payment_result.yaml
    env:
      PAYMENT_RESULT: SUCCESS # SUCCESS/FAILED/CANCELLED

# test duplicate consent behavior
- tapOn: "Launch payment list"
- runFlow:
    when:
      true: ${TRIGGER_BY_CUSTOMER}
    commands:
      - runFlow:
          when:
            true: ${WITH_PAYMENT == 'false'}
          commands:
            # For recurring-only customer-triggered: second attempt with same card should fail
            - runFlow:
                file: flow_pay_with_card.yaml
                env:
                  CARD_NUMBER: ${output.cards.visa}
                  CAN_SAVE_CARD: false
                  SHOULD_SAVE_CARD: false
            - assertVisible: "Payment failed"
            - tapOn: "OK"
      - runFlow:
          when:
            true: ${WITH_PAYMENT}
          commands:
            # For recurring-with-payment customer-triggered: second attempt should succeed
            - runFlow:
                file: flow_pay_with_card.yaml
                env:
                  CARD_NUMBER: ${output.cards.visa}
                  CAN_SAVE_CARD: false
                  SHOULD_SAVE_CARD: false
            - runFlow:
                file: ../Common/flow_handle_payment_result.yaml
                env:
                  PAYMENT_RESULT: SUCCESS
- runFlow:
    when:
      true: ${TRIGGER_BY_CUSTOMER == 'false'}
    commands:
      # For merchant-triggered: second attempt with same card should succeed (both recurring and recurring-with-payment)
      - runFlow:
          file: flow_pay_with_card.yaml
          env:
            CARD_NUMBER: ${output.cards.visa}
            CAN_SAVE_CARD: false
            SHOULD_SAVE_CARD: false
      - runFlow:
          file: ../Common/flow_handle_3ds.yaml
          env:
            CANCEL_3DS: false
      - runFlow:
          file: ../Common/flow_handle_payment_result.yaml
          env:
            PAYMENT_RESULT: SUCCESS

# check and remove consents
- runFlow:
    when:
      true: ${WITH_PAYMENT == 'false'}
    commands:
      # For recurring-only: need to switch to oneOff mode to see consents
      - runFlow:
          file: ../Common/flow_update_checkout_mode.yaml
          env:
            CHECKOUT_MODE: ${output.settings.checkoutMode.oneOff}
- tapOn: "Launch payment list"
- runFlow:
    when:
      true: ${TRIGGER_BY_CUSTOMER}
    commands:
      - assertVisible:
          id: "saved-consent"
          index: 0
      - runFlow:
          file: flow_pay_with_consent.yaml
      - runFlow:
          file: ../Common/flow_handle_payment_result.yaml
          env:
            PAYMENT_RESULT: SUCCESS # SUCCESS/FAILED/CANCELLED
      - tapOn: "Launch payment list"
      - runFlow:
          file: flow_remove_all_consents.yaml
      - tapOn: "Navigate up"
      - runFlow:
          file: ../Common/flow_handle_payment_result.yaml
          env:
            PAYMENT_RESULT: CANCELLED
- runFlow:
    when:
      true: ${TRIGGER_BY_CUSTOMER == 'false'}
    commands:
      # For merchant-triggered: 2nd save succeeded but deduplicated, only 1 consent shown
      - assertVisible:
          id: "saved-consent"
          index: 0
      - runFlow:
          file: ../MerchantTriggered/flow_assert_merchant_consent.yaml
      - tapOn: "Navigate up"
      - runFlow:
          file: ../Common/flow_handle_payment_result.yaml
          env:
            PAYMENT_RESULT: CANCELLED
    