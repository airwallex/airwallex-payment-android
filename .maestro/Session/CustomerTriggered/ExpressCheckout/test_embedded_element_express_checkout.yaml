appId: com.airwallex.paymentacceptance
tags:
  - card
  - embedded
  - express-checkout
  - session
platform:
  android:
    disableAnimations: true  # Disables system animations on the Android emulator
---
- runFlow:
    when:
      true: ${IS_RECORDING}
    commands:
      - startRecording: test_embedded_element_express_checkout_session
- runScript: ../../../Card/cards.js
- runScript: ../../../Common/settings.js
- runFlow:
    file: ../../../Card/flow_embedded_element_express_checkout.yaml
    env:
      LAYOUT: ${output.settings.layout.accordion}
      CARD_NUMBER: ${output.cards.visa}
      USE_NEW_SESSION: true
- runFlow:
    when:
      true: ${IS_RECORDING}
    commands:
      - stopRecording
