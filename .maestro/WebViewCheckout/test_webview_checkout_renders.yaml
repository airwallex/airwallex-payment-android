appId: com.airwallex.paymentacceptance
tags:
  - p0
  - regression
  - webview
---
# P0 webview regression: prove that checkout-ui mounts correctly inside the Android
# H5WebViewActivity (android.webkit.WebView) and that all critical payment method
# entry points render. This is the **webview-specific** risk we own — the actual card
# submission / 3DS / Apple-Google Pay handler logic is covered by the FE Playwright
# suite (paymentacceptance-fe-automation-test) running in a normal browser.
#
# Why no card form submission here:
# Airwallex's card element renders card-number / expiry / CVC inputs in NESTED
# cross-origin iframes (PCI isolation). Android's accessibility tree only surfaces
# the FIRST iframe level, so Maestro cannot reliably target them by id, name, or
# placeholder. Tapping by absolute coordinate works but is brittle across screen
# sizes and demo store layout changes — we explicitly leave that to manual smoke
# or a future coordinate-based suite.
#
# What this regression catches:
#   - H5WebViewActivity misconfiguration (JS disabled, DOM storage off, etc.)
#   - WebView blocks third-party cookies, breaking checkout-ui session
#   - Asset / iframe loading failures (e.g. CSP, mixed-content blocks)
#   - checkout-ui fails to mount HPP element (build / bundling regressions)
#   - Apple Pay / Google Pay button not initialized (PaymentRequest API gating)

- runFlow: flow_open_h5_webview.yaml

# At this point we are inside /shopping-cart in the WebView. Submit the cart to
# transition to the checkout-ui HPP page, which mounts inside the same WebView.
- scrollUntilVisible:
    element: "Check out"
- tapOn: "Check out"

# Wait for checkout-ui (HPP element) to mount. "Card information" is the section
# heading rendered by checkout-ui (i18n key `card.card_information`). It lives in
# the OUTER iframe (checkout.airwallex.com) which IS exposed to a11y.
- extendedWaitUntil:
    visible: "Card information"
    timeout: 30000

# Let the WebView accessibility tree stabilize — checkout-ui mounts payment methods
# asynchronously (Google/Apple Pay availability checks, currency selector hydration)
# and Maestro's a11y snapshots can transiently miss items mid-render.
- assertVisible: "Card information"
- assertVisible:
    text: "Pay .*"

# Take a screenshot for the regression report so we have visual evidence the
# checkout-ui HPP rendered correctly in WebView with all critical payment entry
# points (Card form, Google Pay, Apple Pay, currency-formatted Pay button).
- takeScreenshot: webview_checkout_renders

# --- Digital wallet button: tap-level smoke ---
# Assert the Google Pay button is present AND tappable, and that the tap doesn't
# crash the WebView. This catches:
#   - checkout-ui fails to wire the GPay button onClick handler (most common
#     regression — happened in ACE-560)
#   - WebView crashes on PaymentRequest invocation (e.g. wrong site permissions)
#   - GPay button collapsed to 0x0 because availability check threw
#
# We do NOT assert the native Google Pay sheet actually opens — that requires
# a `system-images;android-34;google_apis_playstore` AVD with Google Wallet
# installed and a tokenized test card. See README "Digital wallet sheet coverage"
# for the setup if you want to extend this.
- assertVisible: "Google Pay"
- tapOn: "Google Pay"
# After the tap, the page must still be responsive: HPP element still mounted and
# the WebView didn't navigate away or crash. We pick "Select payment method" as
# the post-condition because it's stable across selection state (tapping GPay
# collapses the Card section, so "Card information" disappears — use a parent
# anchor that doesn't depend on which payment method is currently expanded).
- extendedWaitUntil:
    visible: "Select payment method"
    timeout: 5000
- assertVisible: "Google Pay"
