appId: com.airwallex.paymentacceptance
tags:
  - card
  - user
  - api-integration
  - recurring
  - new-session
platform:
  android:
    disableAnimations: true  # Disables system animations on the Android emulator
---
- runFlow:
    when:
      true: ${IS_RECORDING}
    commands:
      - startRecording: test_api_customer_recurring_new_session
- launchApp
- runScript: ../../../Card/cards.js
- runScript: ../../../Common/settings.js
- tapOn: "Integrate with low-level API"
- runFlow:
    file: ../../../Common/flow_update_checkout_mode.yaml
    env:
      CHECKOUT_MODE: ${output.settings.checkoutMode.recurring}
# Update settings
- tapOn: setting
- runFlow:
    file: ../../../Common/flow_update_settings.yaml
    env:
      USE_NEW_SESSION: true
      EXPRESS_CHECKOUT: false
      IS_GUEST: false
      UI_TESTING_CUSTOMER_ID: ${UI_TESTING_CUSTOMER_ID}
# Verify no saved cards initially
- scrollUntilVisible:
    element: "Get saved cards"
- tapOn: "Get saved cards"
- assertVisible: "Customer Dialog"
- assertNotVisible: "PAY"
- assertNotVisible: "Visa"
- assertNotVisible: "Mastercard"
- back
# Pay with card - card will be auto-saved in recurring mode
- scrollUntilVisible:
    element: "Pay with card"
    direction: UP
- tapOn: "Pay with card"
- tapOn: "PAY"
- assertVisible: "Payment successful"
- tapOn: "OK"
# Verify 1 saved card - PAY button is disabled in recurring mode
- scrollUntilVisible:
    element: "Get saved cards"
- tapOn: "Get saved cards"
- assertVisible: "Visa •••• 0008"
# Verify PAY button is disabled by tapping it and confirming dialog remains open
- tapOn: "PAY"
- assertVisible: "Customer Dialog"
- back
# Pay with same card again - duplicate should be rejected for recurring (no payment)
- scrollUntilVisible:
    element: "Pay with card"
    direction: UP
- tapOn: "Pay with card"
- tapOn: "PAY"
- assertVisible: "Payment failed"
- assertVisible:
    text: ".*already exists.*"
- tapOn: "OK"
# Verify still only 1 consent (duplicate was rejected)
- scrollUntilVisible:
    element: "Get saved cards"
- tapOn: "Get saved cards"
- assertVisible: "Visa •••• 0008"
- back
# Pay with card and trigger 3DS - should be successful after 3DS
- scrollUntilVisible:
    element: "Pay with card and trigger 3DS"
    direction: UP
- tapOn: "Pay with card and trigger 3DS"
- tapOn: "PAY"
- runFlow:
    file: ../../../Common/flow_handle_3ds.yaml
    env:
      CANCEL_3DS: false
- assertVisible: "Payment successful"
- tapOn: "OK"
# Verify 2 saved cards (first consent + 3DS card)
- scrollUntilVisible:
    element: "Get saved cards"
- tapOn: "Get saved cards"
- assertVisible: "Visa •••• 0008"
- assertVisible: "Mastercard •••• 4518"
# Verify PAY buttons are disabled by tapping one and confirming dialog remains open
- tapOn: "PAY"
- assertVisible: "Customer Dialog"
- back
# Pay with redirect payment - special handling for recurring
- scrollUntilVisible:
    element: "Redirect Payment"
    direction: DOWN
- tapOn: "Redirect Payment"
- runFlow:
    file: ../../../Common/flow_handle_redirect.yaml
# Recurring payment: loading overlay appears, press back to dismiss it
- back
# Go back to MainActivity from APIIntegrationActivity
- back
- tapOn: "Integrate with Airwallex UI"
- tapOn: "Launch payment list"
- runFlow:
    file: ../../../Card/flow_remove_all_consents.yaml
- runFlow:
    when:
      true: ${IS_RECORDING}
    commands:
      - stopRecording
