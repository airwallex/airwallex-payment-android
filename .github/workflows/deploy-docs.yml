name: Deploy Documentation

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  DOCS_VERSION: ${{ github.event.release.tag_name || github.ref_name }}

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    outputs:
      source-sha: ${{ steps.source.outputs.sha }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.release.tag_name || github.ref }}
        fetch-depth: 0

    - id: source
      name: Record source commit
      run: echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        cache-cleanup: always

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Generate HTML documentation
      run: ./gradlew dokkaGeneratePublicationHtml

    - name: Generate Markdown documentation
      run: ./gradlew dokkaGeneratePublicationMarkdown

    - name: Upload markdown documentation
      uses: actions/upload-artifact@v4
      with:
        name: markdown-docs
        path: build/dokka/markdown/
        retention-days: 1

    - name: Deploy HTML to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: build/dokka/html
        branch: gh-pages
        clean: true

  create-docs-pr:
    needs: generate-docs
    runs-on: ubuntu-latest

    steps:
    - name: Checkout default branch
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.repository.default_branch }}
        fetch-depth: 0

    - name: Download markdown documentation
      uses: actions/download-artifact@v4
      with:
        name: markdown-docs
        path: docs/api-reference/markdown

    - name: Create pull request
      uses: peter-evans/create-pull-request@v7
      with:
        commit-message: "docs: update API reference for ${{ env.DOCS_VERSION }}"
        branch: docs/api-reference-${{ github.event.release.tag_name || github.run_id }}
        delete-branch: true
        title: "docs: update API reference for ${{ env.DOCS_VERSION }}"
        add-paths: |
          docs/api-reference/markdown/**
        body: |
          Automated markdown API reference update for `${{ env.DOCS_VERSION }}`.

          - Generated from `${{ needs.generate-docs.outputs.source-sha }}`
          - HTML deployed to GitHub Pages (`gh-pages`)
        base: ${{ github.event.repository.default_branch }}
