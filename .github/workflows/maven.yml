name: Push release to Maven

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  maven:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout project
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # 3.6.0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(sed -nE "s/version = '([0-9.]+)'/\1/p" build.gradle)
            echo "tag=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Set up our JDK environment
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 #3.14.1
        with:
          distribution: 'adopt'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Packages and publishes to Maven Central
      - name: Publish to Maven Central
        run: |
          ./gradlew --stacktrace \
          publishReleasePublicationToSonatypeRepository --max-workers 1 \
          closeAndReleaseSonatypeStagingRepository
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
          SONATYPE_STAGING_PROFILE_ID: ${{ secrets.SONATYPE_STAGING_PROFILE_ID }}
          AIRWALLEX_VERSION_CODE: ${{ github.run_number }}

  repo-dispatch:
    needs: maven
    uses: ./.github/workflows/repo-dispatch-on-release.yml
    with:
      tag: ${{ needs.maven.outputs.tag }}
      wait_minutes: 20
    secrets: inherit
